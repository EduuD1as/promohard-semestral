<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Promohard | Cadastre-se</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="./cadastro.css" />
</head>

<body>
  <div id="esquerda">
    <img src="/assets/1.png" style="width: 820px; height: 600px;">
  </div>

  <div id="direita">
    <div id="cadastroBox">
      <h1>Crie sua conta!</h1>

      <form id="formCadastro">
      <div id="emailSenha">
        <input id="user" type="text" placeholder="Nome de usuário" class="inputs required" oninput="userValidate()"/>
        <span class="span-required">O nome de usuário deve ter no mínimo 3 caractéres</span>

        <input type="email" name="email" id="email" placeholder="E-mail" class="inputs required" oninput="emailValidate()"/>
        <span class="span-required">Digite um e-mail válido</span>

        <input type="password" name="password" id="password" placeholder="Senha" class="inputs required" oninput="passwordValidate()"/>
        <span class="span-required">Digite uma senha com no mínimo 8 caractéres</span>
      </div>

      <div id="divButton">
        <button type="submit">Criar conta</button>
      </div>

      <div id="embaixoBotao">
        <p>Já possui cadastro? Faça <a href="login.html">login.</a></p>
      </div>

      <div id="hrOu">
        <hr>
        <p>ou</p>
        <hr>
      </div>

      <div id="loginFacebookGoogle">
        <button> <img src="/assets/flat-color-icons_google.svg" alt="" style="margin-right: 12px; vertical-align: middle;">Entrar com Google</button>

        <button><img src="/assets/facebook.svg" alt="" style="margin-right: 12px; vertical-align: middle;">Entrar com Facebook</button>
      </div>
    </form>

    </div>
  </div>
  </div>
</body>

<script>
  const form = document.getElementById('cadastroForm');
  const campos = document.querySelectorAll('.required');
  const spans = document.querySelectorAll('.span-required');
  const emailRegex = /^\w+([-+.']\w+)*@\w+([-.]\w+)*\.\w+([-.]\w+)*$/;

  formCadastro.addEventListener('submit', (event) => {
    event.preventDefault();
    userValidate();
    emailValidate();
    passwordValidate();
  });

  function setError(index){
    campos[index].style.border = '2px solid #e63636';
    spans[index].style.display = 'block';
  }

  function removeError(index){
    campos[index].style.border = '';
    spans[index].style.display = 'none';
  }

  function userValidate() {
    if(campos[0].value.length < 3)
    {
      setError(0);
    }
    else
    {
      removeError(0);
    }
  }

  function emailValidate(){
    if(!emailRegex.test(campos[1].value))
    {
      setError(1);
    }
    else
    {
      removeError(1);
    }
  }

  function passwordValidate(){
    if(campos[2].value.length < 8)
    {
      setError(2);
    }
    else
    {
      removeError(2);
    }
  }

</script>

</html>
